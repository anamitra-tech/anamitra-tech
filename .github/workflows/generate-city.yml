name: Generate GitHub City

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: "0 0 * * *"
  push:
    branches: [main, master]
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build-city:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate GitHub City SVG
        run: node scripts/generate-city.js
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_PATH: github-city.svg

      - name: Commit and push SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-city.svg
          git diff --cached --quiet || git commit -m "chore: update GitHub City 🏙️ [skip ci]"
          git push
